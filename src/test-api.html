<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimeShield API Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 { color: #10b981; }
        h2 { color: #3b82f6; font-size: 1.2em; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #059669; }
        button:disabled { background: #4b5563; cursor: not-allowed; }
        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            width: 300px;
            margin: 5px 0;
        }
        .result {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }
        .success { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .error { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .info { color: #94a3b8; font-size: 0.9em; }
        label { display: block; margin-top: 10px; color: #cbd5e1; }
    </style>
</head>
<body>
    <h1>🛡️ CrimeShield API Test Console</h1>
    
    <div class="container">
        <h2>Configuration</h2>
        <div class="info">
            <p><strong>Project ID:</strong> <span id="projectId">Loading...</span></p>
            <p><strong>API Base URL:</strong> <span id="apiUrl">Loading...</span></p>
        </div>
    </div>

    <div class="container">
        <h2>Test Endpoints</h2>
        
        <button onclick="testHealthCheck()" id="healthBtn">Health Check</button>
        
        <div style="margin-top: 20px;">
            <label>Email:</label>
            <input type="email" id="email" value="test@example.com" />
            
            <label>Password:</label>
            <input type="password" id="password" value="password123" />
            
            <div style="margin-top: 10px;">
                <button onclick="testSignup()" id="signupBtn">Test Signup</button>
            </div>
        </div>
        
        <div id="result"></div>
    </div>

    <script type="module">
        // Import Supabase info
        import { projectId, publicAnonKey } from './utils/supabase/info.tsx';
        
        window.projectId = projectId;
        window.publicAnonKey = publicAnonKey;
        window.API_BASE_URL = `https://${projectId}.supabase.co/functions/v1/make-server-cfc8313f`;
        
        document.getElementById('projectId').textContent = projectId;
        document.getElementById('apiUrl').textContent = window.API_BASE_URL;
        
        console.log('Config loaded:', { projectId, publicAnonKey: publicAnonKey.substring(0, 20) + '...' });
    </script>

    <script>
        function showResult(data, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result ' + (isError ? 'error' : 'success');
            resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            btn.disabled = isLoading;
            if (isLoading) {
                btn.textContent = btn.textContent + ' (Loading...)';
            }
        }

        async function testHealthCheck() {
            console.log('Testing health check...');
            setLoading('healthBtn', true);
            
            try {
                const url = `${window.API_BASE_URL}/health`;
                console.log('Calling:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.publicAnonKey}`,
                    },
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (!response.ok) {
                    showResult({ 
                        error: 'Health check failed', 
                        status: response.status,
                        data 
                    }, true);
                } else {
                    showResult(data, false);
                }
            } catch (err) {
                console.error('Error:', err);
                showResult({ error: err.message }, true);
            } finally {
                setTimeout(() => {
                    document.getElementById('healthBtn').textContent = 'Health Check';
                    document.getElementById('healthBtn').disabled = false;
                }, 500);
            }
        }

        async function testSignup() {
            console.log('Testing signup...');
            setLoading('signupBtn', true);
            
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const signupData = {
                    email,
                    password,
                    name: 'Test User',
                    role: 'citizen',
                };
                
                const url = `${window.API_BASE_URL}/auth/signup`;
                console.log('Calling:', url);
                console.log('Data:', signupData);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.publicAnonKey}`,
                    },
                    body: JSON.stringify(signupData),
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (!response.ok) {
                    showResult({ 
                        error: 'Signup failed', 
                        status: response.status,
                        data 
                    }, true);
                } else {
                    showResult(data, false);
                }
            } catch (err) {
                console.error('Error:', err);
                showResult({ error: err.message, stack: err.stack }, true);
            } finally {
                setTimeout(() => {
                    document.getElementById('signupBtn').textContent = 'Test Signup';
                    document.getElementById('signupBtn').disabled = false;
                }, 500);
            }
        }

        window.testHealthCheck = testHealthCheck;
        window.testSignup = testSignup;
    </script>
</body>
</html>
